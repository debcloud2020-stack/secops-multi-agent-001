name: Trigger auto deployment for secops-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/secops-backend-AutoDeployTrigger-b1a22bc0-a3d0-49b9-84fb-eb8852eea9a6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SECOPSBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SECOPSBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SECOPSBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          dockerfilePath: Dockerfile
          containerAppName: secops-backend
          resourceGroup: secops-demo-rg


