# Backend deploy: build the image in ACR, deploy to Container Apps. Auth via GitHub OIDC
# (azure/login@v3) — NO stored AZURE_CREDENTIALS secret.
#
# Manual (workflow_dispatch) on purpose: deploy only after you've provisioned Azure
# (infra/deploy.sh) and set the secrets/vars (infra/bootstrap-oidc.sh + README). Switch to
# `on: push` once the cloud is live if you want continuous deploys.
name: deploy-backend

on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for azure/login
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build + push image (server-side ACR build, tagged by commit SHA)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry ${{ vars.ACR_NAME }} \
              --image secops-backend:${{ github.sha }} \
              --file backend/Dockerfile \
              backend

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: ${{ vars.BACKEND_APP_NAME }}
          imageToDeploy: ${{ vars.ACR_NAME }}.azurecr.io/secops-backend:${{ github.sha }}
