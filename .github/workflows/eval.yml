# Offline eval gate — runs the golden-set suite on every PR + nightly, fully in MOCK_MODE
# (no cloud, no secrets). Created dormant in Phase 5a; active since the repo was pushed in
# Phase 5b-2.
name: eval-gate

on:
  pull_request:
  schedule:
    - cron: "0 7 * * *" # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync backend (with dev deps)
        working-directory: backend
        run: uv sync --group dev

      - name: Lint (backend + evals)
        working-directory: backend
        run: uv run ruff check . ../evals

      - name: Run tests + offline eval gate
        working-directory: backend
        run: uv run pytest tests ../evals -q
